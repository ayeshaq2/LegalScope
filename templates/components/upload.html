<!-- ╔══════════════════════════════════════════════════════════════╗
     ║  UPLOAD VIEW COMPONENT                                      ║
     ║  First screen — user uploads documents & selects options    ║
     ║                                                             ║
     ║  Contains:                                                  ║
     ║   - Hero text                                               ║
     ║   - Drag-and-drop file upload zone                          ║
     ║   - Uploaded files list                                     ║
     ║   - Document type selector (Contract / NDA / Agreement)     ║
     ║   - Analysis focus checkboxes                               ║
     ║   - "Begin Analysis" CTA button                             ║
     ║                                                             ║
     ║  JS dependency: upload.js                                   ║
     ╚══════════════════════════════════════════════════════════════╝ -->

<div id="view-upload" class="view-panel flex-1 flex flex-col items-center justify-center p-8 overflow-y-auto">
  <div class="max-w-xl w-full">

    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-1.5 text-[10px] font-semibold text-gold-400/60 bg-gold-400/[0.06] px-3 py-1 rounded-full uppercase tracking-[0.18em] mb-4">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
        Step 1 of 5
      </div>
      <h2 class="text-3xl font-display font-bold text-white mb-2 tracking-tight">Upload Your Document</h2>
      <p class="text-sm text-gray-500 max-w-md mx-auto leading-relaxed">Upload contracts, NDAs, or legal agreements for AI-powered risk analysis and clause extraction</p>
    </div>

    <!-- Drop Zone -->
    <div id="drop-zone" class="drop-zone-area relative border border-dashed border-white/[0.08] rounded-2xl p-10 text-center cursor-pointer group shimmer-border">
      <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" multiple accept=".pdf,.doc,.docx,.txt">
      <div class="flex flex-col items-center gap-3">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-navy-800 to-navy-900 border border-white/[0.06] flex items-center justify-center group-hover:border-gold-400/20 transition-all shadow-lg">
          <svg class="w-6 h-6 text-gray-500 group-hover:text-gold-400/80 transition-colors duration-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-medium text-gray-300">Drop files here or <span class="text-gold-400 font-semibold">browse</span></p>
          <p class="text-[11px] text-gray-600 mt-1">PDF, DOC, DOCX, TXT — up to 25MB</p>
        </div>
      </div>
    </div>

    <!-- Uploaded Files List -->
    <div id="uploaded-files" class="mt-4 space-y-1.5 hidden">
      <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.15em] mb-2">Uploaded</h3>
      <!-- file items are injected here by upload.js -->
    </div>

    <!-- Document Type Selection -->
    <div class="mt-8">
      <label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.15em] block mb-2.5">Document Type</label>
      <div class="grid grid-cols-3 gap-2.5">
        <button onclick="selectDocType(this, 'Contract')" class="doc-type-btn group p-4 rounded-xl border border-white/[0.05] bg-white/[0.015] text-center">
          <svg class="w-5 h-5 mx-auto mb-2 text-gray-500 group-hover:text-gold-400/80 transition-colors duration-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
          </svg>
          <span class="doc-label text-[11px] font-semibold text-gray-500 group-hover:text-gray-300 transition-colors">Contract</span>
        </button>
        <button onclick="selectDocType(this, 'NDA')" class="doc-type-btn group p-4 rounded-xl border border-white/[0.05] bg-white/[0.015] text-center">
          <svg class="w-5 h-5 mx-auto mb-2 text-gray-500 group-hover:text-gold-400/80 transition-colors duration-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
          <span class="doc-label text-[11px] font-semibold text-gray-500 group-hover:text-gray-300 transition-colors">NDA</span>
        </button>
        <button onclick="selectDocType(this, 'Agreement')" class="doc-type-btn group p-4 rounded-xl border border-white/[0.05] bg-white/[0.015] text-center">
          <svg class="w-5 h-5 mx-auto mb-2 text-gray-500 group-hover:text-gold-400/80 transition-colors duration-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/>
          </svg>
          <span class="doc-label text-[11px] font-semibold text-gray-500 group-hover:text-gray-300 transition-colors">Agreement</span>
        </button>
      </div>
    </div>

    <!-- Analysis Focus Checkboxes -->
    <div class="mt-6">
      <label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.15em] block mb-2.5">Analysis Focus</label>
      <div class="grid grid-cols-2 gap-2">
        <label class="focus-option flex items-center gap-2.5 p-3 rounded-lg border border-white/[0.04] bg-white/[0.01] cursor-pointer">
          <input type="checkbox" class="accent-gold-400 w-3.5 h-3.5 rounded" value="risk">
          <span class="text-[12px] text-gray-400 font-medium">Risk Analysis</span>
        </label>
        <label class="focus-option flex items-center gap-2.5 p-3 rounded-lg border border-white/[0.04] bg-white/[0.01] cursor-pointer">
          <input type="checkbox" class="accent-gold-400 w-3.5 h-3.5 rounded" value="compliance">
          <span class="text-[12px] text-gray-400 font-medium">Compliance Check</span>
        </label>
        <label class="focus-option flex items-center gap-2.5 p-3 rounded-lg border border-white/[0.04] bg-white/[0.01] cursor-pointer">
          <input type="checkbox" class="accent-gold-400 w-3.5 h-3.5 rounded" value="summary">
          <span class="text-[12px] text-gray-400 font-medium">Document Summary</span>
        </label>
        <label class="focus-option flex items-center gap-2.5 p-3 rounded-lg border border-white/[0.04] bg-white/[0.01] cursor-pointer">
          <input type="checkbox" class="accent-gold-400 w-3.5 h-3.5 rounded" value="clauses">
          <span class="text-[12px] text-gray-400 font-medium">Clause Extraction</span>
        </label>
      </div>
    </div>

    <!-- Begin Analysis Button -->
    <button id="btn-begin-analysis" onclick="beginAnalysis()" class="btn-primary mt-8 w-full py-3.5 rounded-xl text-navy-950 font-bold text-sm tracking-wide" disabled>
      Begin Analysis
    </button>

  </div>
</div>
