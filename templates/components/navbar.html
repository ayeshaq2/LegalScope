  <div class="flex items-center justify-between px-5 h-14">

    <!-- Logo -->

      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center shadow-lg shadow-gold-400/10">
        <svg class="w-[18px] h-[18px] text-navy-950" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">

      <button id="btn-analyze" onclick="switchView('analyze')" class="view-btn px-5 py-[6px] rounded-md text-[11px] font-semibold tracking-wide transition-all">

        <span class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
