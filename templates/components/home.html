<div id="view-home" class="view-panel flex-1 flex flex-col items-center justify-center p-8 overflow-y-auto">
  <div class="max-w-3xl w-full">

    <!-- Header -->
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-gold-400 to-gold-600 shadow-lg shadow-gold-400/20 mb-6">
        <svg class="w-8 h-8 text-navy-950" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
        </svg>
      </div>
      <h2 class="text-4xl font-display font-bold text-white mb-3 tracking-tight">Welcome to LegalScope</h2>
      <p class="text-sm text-gray-500 max-w-md mx-auto leading-relaxed">AI-powered legal document analysis and trial preparation. Choose how you'd like to get started.</p>
    </div>

    <!-- Mode Cards -->
    <div class="grid grid-cols-2 gap-5">

      <!-- Lawyer / Case Preparation -->
      <button onclick="selectMode('lawyer')" class="mode-card group glass-card rounded-2xl p-8 text-left">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-gold-400/20 to-gold-600/10 border border-gold-400/15 flex items-center justify-center mb-5 group-hover:border-gold-400/30 transition-all">
          <svg class="w-6 h-6 text-gold-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v17.25m0 0c-1.472 0-2.882.265-4.185.75M12 20.25c1.472 0 2.882.265 4.185.75M18.75 4.97A48.416 48.416 0 0012 4.5c-2.291 0-4.545.16-6.75.47m13.5 0c1.01.143 2.01.317 3 .52m-3-.52l2.62 10.726c.122.499-.106 1.028-.589 1.202a5.988 5.988 0 01-2.031.352 5.988 5.988 0 01-2.031-.352c-.483-.174-.711-.703-.59-1.202L18.75 4.971zm-16.5.52c.99-.203 1.99-.377 3-.52m0 0l2.62 10.726c.122.499-.106 1.028-.589 1.202a5.989 5.989 0 01-2.031.352 5.989 5.989 0 01-2.031-.352c-.483-.174-.711-.703-.59-1.202L5.25 4.971z"/>
          </svg>
        </div>
        <h3 class="text-lg font-display font-bold text-white mb-1.5">Case Preparation</h3>
        <p class="text-[10px] font-semibold text-gold-400/60 uppercase tracking-[0.15em] mb-3">For Legal Professionals</p>
        <p class="text-[12px] text-gray-500 leading-relaxed mb-5">Create case projects, upload evidence and documents, analyze case strategy, and run mock trial simulations.</p>
        <span class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-gold-400 group-hover:gap-2.5 transition-all">
          Open Case Manager
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </span>
      </button>

      <!-- Regular User / Document Analysis -->
      <button onclick="selectMode('user')" class="mode-card group glass-card rounded-2xl p-8 text-left">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-400/20 to-blue-600/10 border border-blue-400/15 flex items-center justify-center mb-5 group-hover:border-blue-400/30 transition-all">
          <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9zm3.75 11.625a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
          </svg>
        </div>
        <h3 class="text-lg font-display font-bold text-white mb-1.5">Document Analysis</h3>
        <p class="text-[10px] font-semibold text-blue-400/60 uppercase tracking-[0.15em] mb-3">For Everyone</p>
        <p class="text-[12px] text-gray-500 leading-relaxed mb-5">Upload a contract, NDA, or any legal document and ask questions to understand it better with AI analysis.</p>
        <span class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-blue-400 group-hover:gap-2.5 transition-all">
          Analyze a Document
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </span>
      </button>

    </div>

  </div>
</div>
